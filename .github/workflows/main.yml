name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: harshitgarg250
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_lines: yes
          plugin_habits: yes
          filename: github-metrics.svg
